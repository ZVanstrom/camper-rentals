          - text: in Slade — convenient, central, and right in the heart of the Gorge. We also deliver to any campground of your choosing at $5 per mile with a minimum charge of $100, which includes full setup at your destination.
      - generic [ref=e99]:
        - heading "Where can I take the camper?" [level=3] [ref=e100]
        - paragraph [ref=e101]: "Long story short, we're flexible. We'll deliver up to 100 miles no problem and we have no issue with you taking our campers around the region. At the end of the day, we're a small family business and we'll do what we can to accommodate your vacation. Tell us about your plans and we'll tell you what we can do. No hidden fees and no wasting your time: our goal is to make it happen or direct you to someone who can."
