    - heading "About Us" [level=2] [ref=e64]
    - generic [ref=e65]:
      - generic [ref=e66]:
        - paragraph [ref=e67]: Our Story
        - paragraph [ref=e68]: Red River Camper Co. is a family business started by a love for sharing the outdoors. We (Michelle and Eric) started renting campers out of northern Indiana in 2020, until we retired and moved our business down to the Lexington and Red River Gorge area. Our kids, software engineers and rock climbing guides, have taken over most of our operations alongside their partners.
      - generic [ref=e69]:
        - paragraph [ref=e70]: Our Promise
        - paragraph [ref=e71]: We pride ourselves on keeping every rental tidy, timely, and homey. We freely include the comforts of home — from coffee to TV to a bed already made — because we know what it's like to live on the road. We also know that planning is stressful, which is why you'll get your camper exactly when you asked for it in eat-off-the-floor condition.
